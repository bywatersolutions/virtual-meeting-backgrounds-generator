<svg width="1440" height="1080" viewBox="0 0 1440 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!--
    4:3 (1440x1080) "Original Ratio" copy of foreground-light.svg: transparent
    foreground overlay, dark ink + black logo, for LIGHTER real backgrounds.
    Only the canvas width and the right-aligned logo x differ. See foreground-light.svg
    for the full notes.
  -->
  <defs>
    <filter id="halo" x="-10%" y="-40%" width="120%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
  </defs>

  <g filter="url(#halo)">
    <!-- Upper-left: name + title -->
    <g font-family="'Helvetica Neue', Arial, sans-serif">
      <rect x="60" y="62" width="8" height="118" rx="4" fill="#1C4A74"/>
      <text x="96" y="124" font-size="68" font-weight="700" fill="#0B1F33" letter-spacing="0.5">{{NAME}}</text>
      <text x="98" y="172" font-size="30" font-weight="400" fill="#0B1F33" opacity="0.85" letter-spacing="2.5">{{TITLE_UPPER}}</text>
    </g>

    <!-- Upper-right: black logo (right-aligned to the narrower 4:3 canvas) -->
    <image x="1016" y="96" width="360" height="114.2" xlink:href="{{LOGO_BLACK}}" href="{{LOGO_BLACK}}"/>
  </g>
</svg>
